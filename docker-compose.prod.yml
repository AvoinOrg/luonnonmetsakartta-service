services:
  app-prod:
    build: .
    env_file:
      - ./.env
    environment:
      IS_PRODUCTION: True
    volumes:
      - .:/app:z
      - ./.cache:/root/.cache
      # - ./.conda-pkgs:/root/conda/pkgs
      - ./.vscode-server:/root/.vscode-server
      - python-dev:/root/dev
    entrypoint: ["/bin/bash", "/app/docker-entrypoint.prod.sh"]
    restart: unless-stopped
    networks:
      - luonnonmetsakartta-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.luonnonmetsakartat-service.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.luonnonmetsakartat-service.entrypoints=websecure"
      - "traefik.http.routers.luonnonmetsakartat-service.tls.certresolver=myresolver"
      - "traefik.http.services.luonnonmetsakartat-service.loadbalancer.server.port=80"
      - autoheal=true

  autoheal:
    image: willfarrell/autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  python-dev:
    driver: local

networks:
  luonnonmetsakartta-net:
    driver: bridge
    ipam:
      driver: default
